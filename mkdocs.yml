site_name: Livewire-hwkUI
site_url: https://hawkiq.github.io/hwkui-docs/
repo_url: https://github.com/hawkiq/livewire-hwkUI
repo_name: hawkiq/livewire-hwkUI
theme:
  name: material
  features:
    - content.code.copy
    - navigation.footer
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
   
nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Components: components.md
  - Widgets: widgets.md
  - Customization: customization.md
  - License: license.md
  - Author: author.md
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
extra_css:
  - assets/hwkui.css
extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/hawkiq"
    - icon: fontawesome/brands/linkedin
      link: "https://www.linkedin.com/in/osamahhasan"
    - icon: fontawesome/brands/facebook
      link: "https://www.facebook.com/hawkiq.gag"
    - icon: fontawesome/brands/instagram
      link: "https://www.instagram.com/hawkiq/"
    - icon: fontawesome/solid/globe
      link: "https://osama.app/"
copyright: "Copyright © 2013-2026 Osama Hasan. All rights reserved."